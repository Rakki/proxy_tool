name: proxy_tool
description: "Android-first proxy client with per-app routing"
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  # Reads installed Android applications for per-app routing selection.
  installed_apps: ^2.1.1
  # Stores non-sensitive settings such as toggles and last selected profile.
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
